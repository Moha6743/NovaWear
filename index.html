<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaWear</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">NovaWear</div>
    <nav>
        <a href="#">Accueil</a>
        <a href="#">Boutique</a>
        <a href="#">Chaussures</a>
        <a href="#">Vêtements</a>
        <a href="#">Accessoires</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Bienvenue chez NovaWear</h1>
    <p>Les dernières tendances mode au meilleur prix.</p>
    <a href="#" class="btn">Découvrir</a>
</section>

<section class="products">
    <div class="product">
        <img src="https://via.placeholder.com/250x250" alt="Produit">
        <h3>T-Shirt Nova</h3>
        <p>24,99 €</p>
        <button>Commander</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/250x250" alt="Produit">
        <h3>Chaussures Urban</h3>
        <p>59,99 €</p>
        <button>Commander</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/250x250" alt="Produit">
        <h3>Claquettes Nova</h3>
        <p>19,99 €</p>
        <button>Commander</button>
    </div>
</section>

<footer>
    <p>© 2026 NovaWear</p>
    <p>Livraison : 3 à 5 semaines</p>
</footer>

</body>
</html>
